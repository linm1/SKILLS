name: CI

on:
  push:
  pull_request:

jobs:
  tabview-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - run: pip install pytest
      - run: cd .github/skills/tabview-to-json && python -m pytest tests/ -q

  sas-schema-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - run: pip install -r .github/skills/sas-schema/scripts/requirements.txt
      - run: python .github/skills/sas-schema/scripts/run_sas_schema.py --help
      - name: Download sample fixture
        run: |
          curl -fsSL -o fixture.sas7bdat \
            https://raw.githubusercontent.com/Roche/pyreadstat/e23b1d8e56b155586cc562827972b6f7e30aab00/test_data/basic/sample.sas7bdat
      - run: python .github/skills/sas-schema/scripts/run_sas_schema.py analyze fixture.sas7bdat > out.json 2>/dev/null
      - run: python -c "import json,sys; d=json.load(open('out.json')); assert d.get('success') is True, d; print('analyze OK')"

  setup-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - run: PYTHON=$(which python) bash setup.sh
      - run: ./.venv/bin/python -c "import pyreadstat, pandas, numpy; print('venv deps OK')"
